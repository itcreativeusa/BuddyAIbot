<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Buddy AI | Your Intelligent Companion</title>
</head>
<body>
    <div class="main-wrapper">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content">
                <div class="ai-orb-container">
                    <div class="ai-orb"></div>
                </div>
                <h1 class="hero-title">Meet <span class="accent-text">Buddy AI</span></h1>
                <p class="hero-subtitle">Your creative partner in the digital realm.</p>
            </div>
        </section>

        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="brand">
                    <div class="logo-placeholder">B</div>
                    <h2 class="name">Buddy AI</h2>
                </div>
                <div class="status">
                    <span class="status-dot"></span> Online
                </div>
            </div>

            <div class="chat-log" id="chat-log">
                <div class="message bot-msg">
                    Hello! I'm Buddy AI. How can I help you today?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" />
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Buddy AI &copy; 2023 | Developed by <span>Kateryna Stetsenko</span></p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
